<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux annif Clara 🎉</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 800% 800%;
            animation: backgroundMove 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        @keyframes backgroundMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 100%;
            padding: 20px;
        }

        h1 {
            margin: 0;
            color: white;
            font-size: clamp(2.2rem, 8vw, 6rem);
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
            animation: spinTitle 8s linear infinite;
            display: inline-block;
        }

        p {
            margin-top: 20px;
            color: white;
            font-size: clamp(1rem, 3vw, 1.8rem);
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes spinTitle {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .star {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: floatStar 6s linear infinite;
            opacity: 0.8;
        }

        @keyframes floatStar {
            from {
                transform: translateY(100vh);
                opacity: 1;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        .balloon {
            position: absolute;
            bottom: -140px;
            width: clamp(35px, 6vw, 60px);
            height: clamp(50px, 8vw, 80px);
            border-radius: 50%;
            animation: rise 12s linear infinite;
            opacity: 0.95;
        }

        .balloon::after {
            content: "";
            position: absolute;
            width: 2px;
            height: clamp(35px, 6vw, 60px);
            background: rgba(255, 255, 255, 0.8);
            left: 50%;
            top: 100%;
            transform: translateX(-50%);
        }

        @keyframes rise {
            from { transform: translateY(0); }
            to { transform: translateY(-130vh); }
        }

        .confetti {
            position: absolute;
            top: -20px;
            width: 10px;
            height: 14px;
            opacity: 0.9;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            from {
                transform: translateY(-10vh) rotate(0deg);
            }
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 16px;
            }

            .container {
                padding: 10px;
            }

            p {
                margin-top: 16px;
            }

            .star {
                width: 4px;
                height: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Joyeux annif Clara 🎉</h1>
        <p>Je te souhaite une journée incroyable, pleine de bonheur ✨</p>
    </div>

    <!-- étoiles -->
    <div class="star" style="left: 8%; animation-delay: 0s;"></div>
    <div class="star" style="left: 18%; animation-delay: 2s;"></div>
    <div class="star" style="left: 32%; animation-delay: 1s;"></div>
    <div class="star" style="left: 48%; animation-delay: 3s;"></div>
    <div class="star" style="left: 64%; animation-delay: 4s;"></div>
    <div class="star" style="left: 79%; animation-delay: 1.5s;"></div>
    <div class="star" style="left: 91%; animation-delay: 2.5s;"></div>

    <!-- ballons -->
    <div class="balloon" style="left: 10%; background: #ff4d6d; animation-delay: 0s;"></div>
    <div class="balloon" style="left: 30%; background: #ffd166; animation-delay: 2s;"></div>
    <div class="balloon" style="left: 55%; background: #06d6a0; animation-delay: 4s;"></div>
    <div class="balloon" style="left: 80%; background: #118ab2; animation-delay: 1s;"></div>

    <script>
        const colors = ["#ff4d6d", "#ffd166", "#06d6a0", "#118ab2", "#ef476f", "#8338ec", "#ffffff"];

        function createConfetti() {
            const confetti = document.createElement("div");
            confetti.classList.add("confetti");

            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 3 + 3) + "s";

            const size = Math.random() * 8 + 6;
            confetti.style.width = size + "px";
            confetti.style.height = size * 1.4 + "px";

            if (Math.random() > 0.5) {
                confetti.style.borderRadius = "50%";
            }

            document.body.appendChild(confetti);

            setTimeout(() => {
                confetti.remove();
            }, 6500);
        }

        setInterval(createConfetti, 120);
    </script>

</body>
</html>
